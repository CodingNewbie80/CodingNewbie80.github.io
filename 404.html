<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page not found — Coding Newbie</title>
<meta http-equiv="refresh" content="5;url=https://codingnewbie.com/">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

  :root {
    --purple-50: #EEEDFE; --purple-800: #3C3489;
    --teal-50: #E1F5EE; --teal-600: #0F6E56; --teal-800: #085041;
    --bg: #ffffff; --bg-secondary: #f7f6f3; --text: #1a1a1a;
    --text-secondary: #5a5a58; --text-tertiary: #888780;
    --border: rgba(0,0,0,0.12);
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg-secondary: #242422; --text: #f0ede8;
      --text-secondary: #a8a5a0; --text-tertiary: #6a6a68;
      --border: rgba(255,255,255,0.10);
      --purple-50: #26215C; --purple-800: #CECBF6;
      --teal-50: #04342C; --teal-800: #9FE1CB;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh;
    display: flex; flex-direction: column;
  }

  nav {
    border-bottom: 0.5px solid var(--border);
    padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 52px;
  }
  .nav-logo { font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 500; color: var(--text); text-decoration: none; }
  .nav-logo span { color: var(--purple-800); }

  .container {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
  }

  .card {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    max-width: 480px; width: 100%;
    text-align: center;
  }

  .code {
    font-family: 'DM Mono', monospace;
    font-size: 48px; font-weight: 500;
    color: var(--purple-800);
    letter-spacing: -0.03em;
    margin-bottom: 12px;
    display: block;
  }

  h1 {
    font-size: 18px; font-weight: 500;
    color: var(--text); margin-bottom: 8px;
  }

  p {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65; margin-bottom: 1.5rem;
  }

  .redirect-notice {
    font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-tertiary);
    margin-bottom: 1.25rem;
  }

  .home-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500;
    color: var(--bg); background: var(--purple-800);
    padding: 8px 20px; border-radius: 20px;
    text-decoration: none; transition: opacity 0.15s;
  }
  .home-link:hover { opacity: 0.85; }

  footer {
    border-top: 0.5px solid var(--border);
    padding: 1.25rem 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
  }
  footer p { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-tertiary); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="https://codingnewbie.com/">coding<span>newbie</span></a>
</nav>

<div class="container">
  <div class="card">
    <span class="code">404</span>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has moved. You'll be redirected to the homepage in a few seconds — or click below to go there now.</p>
    <p class="redirect-notice">redirecting in 5 seconds…</p>
    <a class="home-link" href="https://codingnewbie.com/">Take me home →</a>
  </div>
</div>

<footer>
  <p>© 2026 codingnewbie</p>
  <p>learning to build with AI — from absolute zero</p>
</footer>

<script>
  // Countdown timer
  let seconds = 5;
  const notice = document.querySelector('.redirect-notice');
  const interval = setInterval(() => {
    seconds--;
    if (seconds <= 0) {
      clearInterval(interval);
      notice.textContent = 'redirecting now…';
      window.location.href = 'https://codingnewbie.com/';
    } else {
      notice.textContent = `redirecting in ${seconds} second${seconds === 1 ? '' : 's'}…`;
    }
  }, 1000);
</script>

</body>
</html>
